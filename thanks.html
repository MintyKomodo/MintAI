<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You — MintAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --mint: #00d876;
            --mint-soft: #e8faf0;
            --bg: #f5f5f5;
            --text: #1a1a1a;
            --text-secondary: #666666;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 480px;
        }
        .check {
            width: 72px; height: 72px; border-radius: 50%;
            background: var(--mint-soft); border: 2px solid var(--mint);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 24px; font-size: 32px; color: var(--mint);
        }
        h1 {
            font-size: 32px; font-weight: 800; margin-bottom: 12px; letter-spacing: -1px;
        }
        p {
            font-size: 16px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 32px;
        }
        a {
            display: inline-block; padding: 13px 32px;
            background: var(--mint); color: #fff;
            border-radius: 8px; font-weight: 600; font-size: 15px;
            text-decoration: none; transition: all 0.2s;
        }
        a:hover {
            background: #00c46a; box-shadow: 0 4px 16px rgba(0, 216, 118, 0.25);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="check">&#10003;</div>
        <h1>Thank You!</h1>
        <p>We've received your interest. Our team will be in touch shortly with the pitch deck and next steps.</p>
        <a href="/">Back to MintAI</a>
    </div>
</body>
</html>
