<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You — MintAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --mint: #00ff88;
            --dark: #0a0a0a;
            --dark-card: #111111;
            --dark-border: #1a1a1a;
            --gray: #888888;
            --white: #f0f0f0;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--dark);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .bg-grid {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }
        .container {
            position: relative; z-index: 1;
            text-align: center; padding: 40px 24px; max-width: 520px;
        }
        .check {
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(0, 255, 136, 0.1); border: 2px solid var(--mint);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 28px; font-size: 36px;
            box-shadow: 0 0 40px rgba(0, 255, 136, 0.2);
        }
        h1 {
            font-size: 36px; font-weight: 800; margin-bottom: 16px; letter-spacing: -1px;
        }
        h1 span { color: var(--mint); }
        p {
            font-size: 16px; color: var(--gray); line-height: 1.6; margin-bottom: 32px;
        }
        a {
            display: inline-block; padding: 14px 32px;
            background: var(--mint); color: var(--dark);
            border-radius: 10px; font-weight: 700; font-size: 15px;
            text-decoration: none; transition: all 0.2s;
        }
        a:hover {
            background: #00ff99; box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="container">
        <div class="check">&#10003;</div>
        <h1>Thank <span>You!</span></h1>
        <p>We've received your interest. Our team will reach out to griffin@mint-ai.tech with the pitch deck and next steps shortly.</p>
        <a href="/">Back to MintAI</a>
    </div>
</body>
</html>
